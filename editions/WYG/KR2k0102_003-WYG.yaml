body:
  text: 石柱記箋釋巻三歸安鄭元慶撰山川卞山法華寺金井玉澗乳竇石膏温泉項王走馬埒項王飲馬池項王繫馬石卞山峻極非清秋爽月不見其頂望氣者云常有黄氣紫雲居者吳興雜録卞山有石匱每欲開則風雨晦冥輿地志卞山郡國志作卞和採玉處非也周處風土記云卞山當作冠弁之弁徐陵孝義寺碑云髙弁蒼蒼遥聞天語太平寰宇記卞和採玉以在荆山當陽縣者為的餘非是是時吳楚參隔和得玉不獻吳君而僕僕楚庭必無是理風土記說是石虹日記按卞山在烏程縣西北一十八里髙六千丈為呉興主山雖四㪚各表為名其實皆卞也諸史俱作卞圖經亦云卞山卞姓居之演緐露為山形如弁亦與卞通勞府志云古卞弁通用不必強為穿鑿周氏之言何足據也其山西北屬長興縣法華山太平寰宇記謂之石斗山王羲之嘗遊處焉梁尼道蹟號總持得法於達磨居卞山書夜誦法華經二十年不下山後歸寂即葬其處大同元年塔内忽生青蓮花道俗異之州郡録實表奏敕置法華寺談志按法華山即今白雀夾道松隂坡陀直上皎然詩路入松聲逺更奇山尤水色共參差蘇東坡題曰青蓮道塲金井在卞山東麓梁貞明初有黄龍見易名黄龍洞洞口黄山谷題額刻於石談志按制每歳五月二十日有司致祭湖人稱是日為分龍日農政全書云五月二十日大分龍無雨而有雷謂之鎻雷門霓見則旱石林在卞山之陽葉少藴之所居也其鄰有朱氏怡雲菴涵空橋橋下為玉澗故少藴以玉澗名其書吳興園林記按石林即玲瓏山唐宋人題名最多一巖上題云前湖州刺史杜牧大中五年八月八日來有歸雲洞宋道士張有篆於石宣和石譜云湖石出卞山者最為奇秀布滿山間嵌空礧塊色𩔖靈璧而青潤可愛癸辛雜識云艮嶽興大役連轤輦致不遺餘力其大峰特秀者不特封侯或賜金帶且各圖為譜其工人多出於呉興謂之山匠四方之為山者皆於此取之盧氏雜說云唐有達僚差軍將於湖州買石軍將申狀云前狀石蛀蚛不堪買此言甚鮮可作呉興佳話乳竇按舊志不載乳竇明一統志云烏程卞山出石鍾乳疑即乳竇中所滴也先給諫鳴缶集云卞山之陽有黒龍洞郡志不載其洞庳前軒後如夏屋之半廣可肆十筵其石都垂垂下懸如綴上産石鍾乳潤白如蜃灰石膏文理細密曰細理石性寒如水曰寒水石有軟硬二種自陶𢎞景蘇恭大明雷斆蘇頌閻忠孝皆以硬者為石膏軟者為寒水石至朱震亨始斷然以軟者為石膏而後人遵用有驗今人以収豆腐乃昔人所不知本草綱目按别録石鍾乳生少室山谷及泰山𢎞景曰第一出始興而江陵及東境名山石洞皆有之恭曰第一始興其次廣連澧朗郴等州今陜州青溪房州二洞出者亞於始興頌曰今道州江隂縣及連英韶階峽州山中皆有之又别録石膏生齊山山谷及齊盧山魯蒙山𢎞景曰二郡之山即青州徐州也今出錢唐縣斆曰石膏出剡州頌曰今汾孟虢耀州慶元亦有之俱不及卞山豈諸人未見魯公所記故不入録邪温泉按舊志不載温泉卞山志法華寺有五靈泉資福寺冇露泉碧巖有珠簾泉石林有品泉蒼山有鳳咮泉白鶴寺有豢龍泉二致泉有人題白鶴山十二景詩其八詠二致泉云九夏寒凝雹三冬燠若湯不随人冷熱豈逐世炎凉斯即所稱温泉歟丹鉛總録云温泉所在必有白礬丹砂硫黄三物為之根乃蒸為暖流卞山有項王走馬埒飲馬池繫馬朩石間又有項王馬跡山墟名按異苑云卞山舊名土山有項羽廟號卞山王故名卞山卞山志云山之西南夾作橋有廟焉廟中石像冠通天冠幷祀虞姫及父老而郷人以為關帝云郡中亦有廟在奉勝門内俗呼為霸王門者謂此廟中有碑魯公作碑隂述云西楚霸王當秦之末與叔梁避仇呉中蓋今之湖州也雖滅秦而宰制天下其魂魄猶樂兹邦至今廟食不絶其神靈事迹具竞陵子陸羽所載圖經大歴八年眞卿䝉刺是州十二載姦臣伏法恩命追真卿上都克期首路竟陵是諗予以故碑顚趾嘗因仍草莽已而復之眞卿乃命再加崇樹以紀之時則仲夏方生明之日勞志又載有廟碑宋雍熈四年九月一日宣奉郎守太子中允湖州通判張懌撰今廟與碑竝不存衡山帝顓頊冢春秋鳩兹城夀夢十六年楚恭王怨吳為巫臣伐之也乃舉兵伐吳至衡山而還注云見左傳襄公三年楚克鳩兹至于衡山吳越春秋衡山一名横山在烏程縣南一十八里兩山夾峙中流北駛為郡城南形勝之地談志帝顓頊冢見前左傳襄公三年春楚子重伐吳為簡之師克鳩兹至于衡山杜注鳩兹呉也在丹陽蕪湖縣東衡山在吳興烏程縣南太平府志蕪湖縣東三十里故蕪湖城即春秋鳩兹城也蓋鳩兹之克始入吳境而至于衡山則深入腹地矣二地不相附近楚以舟師伐吳其所由者中江也漢地理志云中江出蕪湖縣西南至陽羡縣入海今髙淳之胥溪溧陽之永陽江宜興之荆溪皆中江也楚師蓋由荆溪入太湖抵衡山而還耳哀公十五年楚子西子期伐吳及桐汭杜注宣城廣徳縣西南有桐水出白石山西北入丹陽湖此亦是中江之路楚舟師伐吳輒由蕪湖入自西而東而南至於衡山極矣若菰城則更在衡山之南楚師決不由東南入也且凡言至於者皆自此至彼中間相去頗逺今菰城在縣南十八里去衡山無幾何得稱至於此理亦甚明謂鳩兹在烏程一誤以菰城為鳩兹再誤三餘漫鈔按郡國志烏程縣南十八里有下菰城呉時鄭嫗善相人者居此又云春申君立菰城縣在郡南二十五里秦改為烏程至今有城因山宋為牧馬所則是一地而指為兩處也海録亦云烏程縣乃古菰城楚以封春申君今俗呼下菰城而舊經謂之五菰城諸書皆不足據也按史記楚封歇為春申君賜淮北十二縣後十二年復獻淮北地請封於江東因城故呉墟以為都邑今姑蘇城内西北隅四縦五横之迹皆是則其封邑安得在呉興邪吾意下菰城者或春申君伐呉時屯駐之處峴山顯亭故别駕李適之石酒罇五花亭峴山在烏程縣南五里本名顯山晉太守殷康於山上起顯亭以避唐諱改之寰宇通志按唐中宗諱顯魯公旣書峴山何以又書顯亭也問之竹垞先生先生示予唐大詔令顯慶五年正月詔曰孔宣設教正名為首戴聖貽範嫌名不諱比見鈔寫古典至於朕名或􅆙其㸃畫或隨便改換恐六籍雅言會意多爽九流通義指事多違誠非立書之本意也自今己後繕寫舊典文字竝宜使成不須隨義改易則知魯公之書顯亭者遵顯慶之詔爾唐開元中李適之為湖州别駕峴山有石觴員可貯酒五斗適之每挈所親登山酣飲望帝鄉時時以醉土民呼為李相石罇顔真卿及門生弟姪多攜壺檥檝以遊作李相石罇聨句詩叙云因積溜潨石嵌為罇形公注酒其中結宇環飲之處𩔖要按唐書適之恒山愍王孫天寳元年進左相後為李林甫所構遭貶尋自殺飲中八仙歌所謂左相日興費萬錢飲如長鯨吸百川銜杯樂聖稱避賢者也石罇聨句李公登飲處因石為窪罇顔真卿人事歳年改峴山今古存劉全白蓁蕪掩前迹苔蘚餘舊痕裴循叔子尚遺徳山公此迴軒張薦維舟陪髙興感昔情彌敦吳筠藹藹賢哲事依依離會言強蒙嶇嶔横道周迢遞連山根范縉餘烈一作列曖林野衆芳揖蘭蓀王純徳輝映巖足勝賞延髙原魏理逺水匹明練因晴見吳門王修甫陪遊追盛美揆徳欣討論顔峴器有成形用工資造化元左輔元流霞方泔淡别鶴遽翩翻劉茂舊規傾亦賞新興麗初暾顔渾醉後接䍦倒歸時騶騎喧楊徳元遲回向遺迹離别益傷魂韋介覽事古興屬送人歸思繁釋晝懷賢久徂謝贈逺空攀援崔𢎞公案鐫懿躅髙名播乾坤文仲宣松深引閒歩葛弱供險捫陸羽花氣酒中馥雲華衣上屯丘子中一作權器森沉列湖渚牢落望郊園陸士修白日半巖岫清風滿丘樊裴幼清旌麾間翠幄簫鼔來朱轓柳淡閒路躡雲影清心澄水源釋塵外萍連浦中嶼竹遶山下村顔顓景落全溪暗烟凝半嶺昏顔頎去日往如復換年凉代温顔須登臨繼風騷義激舊府恩李萼美合集按掌故集云魯公聮句者二十有九人公之二子亦與焉内劉全白先以評事遊湖後貞元為守呉筠入嵩山為道士來此李萼先仕殿中侍御史公辟為防禦副使左輔元先因公刺撫州増廣韻海五百巻至是來湖三教俱集且不遺後進公之襟度如是真可謂之雅集惜未有泐之石者神仙張志和趙東坡詩魯公賔客皆詩酒誰是次公注云𤣥眞子姓張名志和顔魯公與之友善魯公刺湖州與門客會飲乃唱和為漁父詞其首唱即志和之詞曰西塞山前白鷺飛桃花流水鱖魚肥青篛笠緑蓑衣斜風細雨不湏歸魯公與陸鴻漸徐士衡李成矩共唱和二十五首遞相誇尚名畵録云志和漁釣呉興顔魯公典郡知其髙節以漁歌五首贈之張乃隨句賦象人物舟船烟波風月鳥獸皆依其文寫之曲盡其妙西塞山在縣西一十八里經鉏堂雜志云下菰菁山之間一帶逺山為西塞勞府志因之云在縣西南二十五里非也趙次公謂西塞為湖州磁湖鎭道士磯尤謬蓋磁湖鎮在武昌野客叢書云天下有兩西塞一在霅川一在武昌按唐書張志和願浮家泛宅往來苕霅間又志和詞中有霅溪灣裏釣魚翁之句明此知志和之西塞正在霅川而在武昌乃曹武成王用師之城洪内翰作西塞漁社圗亦嘗辨此而劉氏漫録乃謂志和西塞在武昌所見誤矣唐天寶中刺史韋景先起五花亭太平寰宇記唐選士用五花判事為韋氏所建白韋璋韋南金韋景先三世為湖守因以名亭談志按清異録云峴山有洛如花似竹而叢生郡有文人則出山南曰蘇灣蘇子瞻常游之蓴菜生焉菰城八諎云蘇灣之蓴勝於蕭山湘湖每誦鶴生嫩頂浮新紫龍脱香􅐖帶舊涎便令季鷹思切山上有三賢伺明正德已卯督學使者劉瑞建祀顔魯公蘇東坡王梅溪皆嘗守湖州而有功德於民者明季増入監司王鳳洲稱四賢今為歴代名守祠矣峴山志云予友程學顔嘗聞諸唐一菴先生曰峴山舊有髙風堂祀隱逸諸公披裘翁呉慶之沈闕沈警沈顗沈道䖍沈徽賈收胡仔林静章得一沈貞夏義甫王升呉珫凡十五人後増衛冨益一人其址即逸老堂是又有嘉客祠祀流寓諸公錢林呉𦍑沈戎丘騰裴子野張志和陸羽呉筠陸龜䝉姜䕫何彦猷程大昌蔡洸方淑劉光祖程公許髙斯得牟子才游佀呉潛貢師泰呉玠共二十二人後増張羽徐賁二人其址即滴翠軒是第未知建自何年毁自何歳予考呉慶之濮陽人衛冨益崇德人應入嘉客祠丘騰烏程人應入髙風堂呉潛德清人貢師泰呉玠未嘗寓湖州不應入嘉客祠再欲於髙風堂增呉馮錢選周密趙金龎太元呉夢暘六人於嘉客祠増温祥卿劉麟孫一元徐獻忠呉炯李樂黄周星楊爾銘夏古丹九人一幷請之當事仍列祀典逸老堂嘉靖二十六年湖州通判楚東湯世賢為劉南坦蔣石菴諸老建春秋社㑹之所滴翠軒今為僧寮堂下數十武即窪罇亭今圮又前為浮碧亭下瞰峴山漾漾納衆山之水清而碧每風生浪湧其色可觀故又名碧浪湖中央巨石如積不以水盈縮為髙卑曰小浮玉山以别孝豐之大浮玉也家有浮圖竹垞先生語予曰揚子金山名浮玉安知小浮玉之名不以是山比之乎其說頗可聽今湖中泥沙淤塞漸成洲渚遇旱熯舟楫罕通此亦呉興之一患也司民社者曷留意焉杼山妙喜寺黄浦橋避它城何楷釣臺杼山在烏程縣西南三十里山墟名曰昔夏后杼巡狩之所舊名東張多勝景游者忘歸因號稽留山太平寰宇記杼山之陽有妙喜寺梁武帝之所置也寺前二十歩跨澗有黄浦橋其水自杼山西南五里黄檗山出故號黄浦寺東偏有招隠院其前堂西廈謂之温閣從草堂東南屈曲有懸巖徑行百歩至吳興太守何楷釣臺西北五十歩至避它城按說文云它蛇也上古患它而相問得無它乎蓋徃古之人築城以避它也竟陵陸羽杼山記所載如此顔魯公集按黄浦發源黄檗山呉興記傅會春申君及後漢司隸校尉黄向皆非也福建建寜府浦城縣昔為呉興縣亦有黄檗山歐餘漫録云分呉丹陽為呉興郡者呉寳鼎元年也置呉興縣於建安郡者呉永安三年也郡縣名雖同而地之相去逺矣宋江淹為呉興今嘗自叙云呉興地在東南嶠外閩越之舊境其游黄檗山詩亦云閩雲連越邊何顔魯公杼山碑摭淹賦詩事乎太平寰宇記晏氏類要輿地紀勝諸書俱仍其譌曰黄檗山梁尤祿卿江淹賦詩之所再按晉陸邁宋賀道力梁王琰俱呉興令宋檀道濟沈懷明唐沈佺期封呉興侯與子男其明冠以建安郡者封懐明詔及淹本傳也栗祁府志混入江淹王琰在守令表中後魏改襄州為湖州樂遜冀儁廣固皇甫道李夀俱湖州户曹參軍西呉里語亦混載之長興舊名長城武康舊名永安唐改武康為安州又改為武州考諸史書三山縣舊名長城百泉縣後魏置長城郡黄石縣西魏改為長城如北齊信都芳後周令狐整封長城縣子是也陽安縣西魏置武康郡如崔士謙令狐熙封武康郡公是也洋州趙宋置武康軍如福王與芮及韓琦姚麟俱武康軍節度使畢再遇武康軍承宣使是也浠水舊置永安郡黄岡亦名永安普安郡梁改為安州武陵郡梁改為武州又開徳冇德清軍保安冇德清砦括蒼冇霅川荆州有烏程鄉輿地之名相混如此汲古者不可不察也妙喜寺碑云大歴七年蒙刺是邦觀察判官御史袁君髙巡部㑹於此山遂立亭於東南陸處士羽以癸丑歳冬十一月癸卯二十一日癸亥建名之曰三癸又云自典校時著韻海鏡源未遑刊削壬子歳叨刺於湖公務之暇與金陵沙門法海前殿中侍御史李萼陸羽國子助教州人禇沖評事湯衡清河泉太祝柳察長城丞潘述縣尉裴循常熟主簿蕭存嘉興尉陸士修後進楊遂初崔𢎞楊徳元胡仲南陽湯渉顔祭韋介左興宗顔策以季夏於州學及放生池討論至冬徙於兹山來年春遂終其事考之乞御書題額恩敕批荅碑隂記云七年秋九月歸自東京起家除湖州刺史來年春正月至任放生池碑亦書云七年秋九月巳亥䝉除不應壬子之九月至京癸丑之正月至任而壬子之季夏巳與羣士討論於州學冬復徙於杼山癸丑之春遂成書而終事碑銘云三癸嶙峋又云紛吾著書羣彦惠臻言羣彦著書於三癸之亭也夫既大歴七年蒙刺是邦癸丑十月方有此亭安得壬子之冬羣彦巳集是必寺碑傳寫於金石剥落之餘誤以癸丑為壬子當終事於甲寅之春也顔魯公年譜顔魯公於杼山起桂棚三癸亭及謝臨川寫真堂類要按謝靈運官臨川内史嘗遊寓呉興相傳謝村福田寺其故宅也僧皎然自稱靈運十世孫寫真堂想魯公為皎然起耳昇山吳均入東記晉吳興太守王羲之烏亭昇山一名歐餘山又名歐亭山晉越王無疆之子蹄封於歐餘山之陽為歐陽亭侯子孫因以為氏明一統志按漢書注云烏程有歐陽亭即此昇山在烏程縣東二十里入東記云晉王羲之為太守嘗遊踐因昇此山顧謂賔客曰百年之後誰知王逸少與諸卿遊此乎因有昇山之號太平寰宇記按入東記呉均所著昇山云云出其記中魯公何以割裂書之晉書羲之本傳竝未有呉興太守之文呉興名郡六朝諸公紛紛奏乞以為韻事凡典郡者史必大書特書何獨於逸少而佚之吾終不敢信也烏亭在昇山上王羲之造以烏巾氏所居也寰宇通志按談志昇山一名烏山舊編云古烏巾氏所居也今縣東八里有烏山一名别鮮山爾雅小山别大山鮮疏云不相連屬者予嘗讀書烏山登其巓望西余山下有小山似相屬及至其處又相去里許則所謂别鮮山者疑即西余而非烏山也至問烏山何以名土人曰古烏巾氏所居山上有烏亭舊址即今烏巾菴山下有烏板橋舊有烏氏聚族於此則梁呉均同柳呉興烏亭集送柳舎人詩蓋即此山而非昇山也二山離郭不逺極易考見乃蒙混至此又按晉書羲之為會稽内史晉作中替重以王敦蘇峻鼓亂羲之自負經濟知時事不可為遂稱病去郡與東土人士盡山水之遊則義之雖未嘗守郡然來遊踐此山亦未可知羲之子獻之嘗為呉興此亭或獻之造當時人或誤書之金蓋山何氏書堂張邵丘道祚禪幽寺晉何楷居金蓋山修儒業後為吳興太守改為何山括地志何山亦曰金蓋山蘇子瞻遊之有詩方輿勝覽按何山與道場連接為北一支金蓋山是南一支汪藻記云東有道場西有何山金蓋固在道場之東南自不容混蘇子瞻詩云今古何山是勝遊亂峰縈轉繞滄洲雲含老樹明還滅石礙飛泉咽復流遍嶺烟霞迷俗客一溪風雨送歸舟自嗟塵土先衰老底事孤僧亦白頭山上有宋安定先生胡瑗墓金蓋山故多雲氣乙未三月擕伴曉入山觀望四山繚繞如垣中間田段平衍環視如在甑中受烝潤也少焉日出雲氣漸散惟金蓋獨遲越不易解予謂氣盛必有佳泉乃南渉坡陀見大楊梅樹下汨汨有聲清泠可愛急移茶具就之茶不能變其色土人言十里内蠶絲俱汲此煮之輒光白大售下注田段可百畝名曰雲泉水品按金蓋山在烏程縣南十二里頂常出雲諺云金蓋戴帽要雨就到農家以此為驗道場山亦名雲峰唐中和間僧如訥建伏虎道場蘋洲可談云道場在州之離方山背建一浮圖文筆峰也蘇東坡詩有道場山頂何山麓之句汪藻云遊道場者如入王侯之家過何山如造髙人隱士之廬何氏書堂圗記相承以何氏為晉何楷楷嘗讀書此山後為吳興太守以其居為寺而名其山顔魯公書杼山碑亦曰寺西南有何楷釣臺則楷嘗居此山無疑然楷之姓名於晉史無所見惟沈約宋書敘何子平曽祖楷為晉侍中而唐林氏姓纂亦云何叡渡江生楷為晉侍中晉書稱叡有子五人獨充準有傳而不及其餘括地志謂楷為吳興太守宋書乃以楷為晉侍中豈沈約見何充嘗除侍中因誤謂充為楷抑為吳興太守後亦至侍中邪皆不得而知也浮溪集宋元嘉十四年張邵丘道祚共建禪幽寺於何山即崇報禪寺談志按張邵字茂宗呉郡人宋元嘉中為呉興太守丘道祚不知何許人姓系姓纂諸書竝載呉興丘氏有新安太守道護建安太守道成則道祚亦郡人也石柱記箋釋巻三
