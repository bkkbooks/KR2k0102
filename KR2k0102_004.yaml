body:
  text: 石柱記箋釋卷四歸安鄭元慶撰太湖周回四萬八千頃太湖周三萬六千頃其千頃烏程也去縣五十里越絶書按吳郡續圖經云太湖吐吸江海包絡丹陽義興吳吳興之境其所容者大故以太稱焉七修類纂云太湖之名不一禹貢曰震澤爾雅曰具區國語曰太湖吳越春秋曰笠澤周官職方曰五湖而五湖之義亦不同吳録云周行五百里以五湖為名川瀆記云太湖東通松江南通霅溪西通荆溪北通滆湖東通韭溪凡五道謂之五湖三吳郡國志又以胥湖蠡湖洮湖滆湖四湖合太湖為五笠澤叢書云太湖上稟咸池五車之氣故一水五名曰菱湖曰莫湖曰胥湖曰遊湖曰貢湖未審孰是太湖自古相傳三萬六千頃魯公何以云四萬八千頃也太湖今去烏程縣止一十八里越絶書何以云去縣五十里也王鏊姑蘇志云太湖東西二百餘里南北一百二十里占蘇湖常三州今蘇之吳吳江湖之烏程長興常之宜興武進無錫七縣皆瀕太湖新唐書志以為占蘇宣常湖四州之境誤也明一統志亦承其誤吳越天寶八年置都水營田使以主水事募卒為部號曰撩淺軍亦謂之撩清命於太湖旁置撩清卒四部凡七八千人專為田事治河築隄一路徑入吳淞江一路自急水港下澱山湖入海居民遇旱則運水種田潦則引水出田又開東府南湖立法甚備十國春秋按吳越錢氏在東南專享水利是時歲屢稔錢五十文糴米一石自歸宋後農政不修田圍河港大半毁壞然田稅每畝不過一斗創買公田民猶易辦自景定四年賈似道之説浙西六郡買田至三百五十餘萬頃姑蘇志云宋之田有曰公田每畝起租上自一石五斗下至七斗七升四合曰圍田租四斗或三斗曰沙田租三斗或二斗曰成田納糧二斗曰營田租四斗或三斗二斗曰職田上自八斗七升下至六斗三合五勺曰常平田曰義役田曰社倉田曰局官租田曰養濟局田曰居養院田曰囚糧田曰役官田科髙下有差髙者不踰一石五斗下至二斗夫圍田沙田成田皆民田也其餘皆官田也故宋史有一曰公田之賦一曰民田之賦元有天下取之江南者曰夏稅曰秋稅而不言官民田之分日知録云元之重租田皆别領於官松江府志言元時苗稅公田外復有江淮財賦都總管府又有江浙財賦府各領官田籍沒田皆不繫州縣元額而元史所記賜田大臣無不以平江等處是時官田甚多張士誠竊據姑蘇明太祖命大將軍徐逹等統兵攻之相抗十餘年太祖怒其城久不下惡民之附寇籍沒義兵頭目田及給賜功臣田以租簿付之有司照租為稅額每畝科糧七斗五升及一石以上其民田仍不過五升起科其載從信録及周文襄年譜又冨民沈萬三等多以事被籍而浙西之官田多而益多此三吳重賦之大凡也再按宋史吾湖當景定時臨安府通判陳訔催督謝奜燾趙與訔王唐圭馬元演等至州買田獨多又按明太祖實録及平吳録元至正十六年四月壬子張士誠將趙打虎陷湖州有烏程歸安德清武康四縣地十七年二月丙午朔太祖遣耿炳文劉成自廣德取長興九月丙戌廣興翼元帥費子賢率兵取武康十八年元帥費子愚總管張德下安吉各築城相持且戰且守者十年至丙午年十月始下湖州太祖之怒自不能免以故烏程歸安德清三縣田糧比長興安吉武康三縣獨多此其明驗也又洪武間南潯冨民沈冨璉市沈明前丘馮璋士林金鈿俱以廣資被籍湖州沒官田又最多孝陵雖有減租之詔七斗五升至四斗四升者不過減十之二民困未蘇然其時建都金陵糧運不逺耗輕易舉及遷北平轉輸煩費民不堪命宣德五年侍郎周忱巡撫南直隸兼管嘉湖二府始於額外加徴耗米用以兊軍攴運其法正糧一石加耗七斗而攴兊逺近就中伸縮有差於是民得免逺漕之苦法行至今所謂稅糧改為增耗者此也是時田上起科尚分官民等則官田自重至輕凡五百九十九則民田自輕入重凡三千八百四十一則夫民田以已業稅輕輕之極畝止五升而耗之增也無幾官田以承佃稅重重之極畝至七斗而耗之增也益多雖嘗調劑其間重者凖折金花輕者盡派白糧而則之名目既衆下之姦弊日繁鬻業者既減額以求售豪強者復行賄以遊移版籍同彼絲棼訟牒幾至山積於是景泰二年從浙江右布政使楊瓚之言將湖州官田重租分派民田輕租之家承納正德十五年湖州知府劉天和議將官民田各均為一則嘉靖二十年知府張鐸又議將官民田共均為一則從此官民田混而為一相沿至今欲知何者為官田何者為民田民田仍舊輕科官田籲恩減額而册籍無憑顚連莫告甚矣湖州民力之不支也禹貢揚州厥土惟塗泥厥田惟下下厥賦下上上錯而今何如哉祝枝山前聞有云三吳在古其民皆斷髮文身以與蛟龍雜處若空其地為最下也今財賦日煩而古之遺迹不異其水之不為害者天幸爾萬一洚水不知何以處之吁可畏哉太湖有沿湖之隄多為漊漊有斗門制以巨朩甚固門各有閘版旱則閉之以防溪水之走泄有東北風亦閉之以防湖水之暴漲舟行且有所檥泊官主其事為利浩博後漸堙廢頗為郡害豫觀蘇東坡水利奏議云太湖受諸州之水先治吳江南岸茭葑蘆葦之積則水東瀉而無壅滯之患諸州利矣今吳江茭葦屯結尤甚皆成墟田其長橋諸洞湮塞殆盡近來十水九淹不可救捍後之治水者宜究心當先務也談志烏程縣水總瀦之地為太湖瀉水之口小梅以東凡八西金港顧家港官瀆港張家港宣家港楊瀆港泥橋港寺橋港大錢以東凡二十八計家港湯漊沈漊和尚漊羅漊大漊新涇漊潘漊諸漊張港漊幻湖漊西金漊東金漊許漊楊漊謝漊義髙漊陳漊薄漊五浦漊蔣漊錢漊新浦漊石橋漊盛漊宋漊喬漊胡漊烏程唐志長興沿湖水口凡三十有四斯圻港響水澗金村港蘇家港上周港長大港夾浦港謝莊港丁家港雞籠港大陳瀆杭瀆港石屑港莫家港盧瀆港金雞港新塘港徐家港百步港竹篠港殷瀆港楊家浦福緣港石瀆港新開港花橋港坍湀港蘆圻港白茅港竇瀆港涇山港小陳瀆蔡浦港小梅港太湖圗考按宋程大昌修湖漊記云湖漊三十有六其九屬吳江其二十七屬烏程惟計家港近溪而闊獨不置閘紹興二年知州事王回修之又改二十七漊名曰豐登稔熟康寧安樂瑞慶福禧和裕阜通惠澤吉利泰興冨足固益濟而皆冠以常字明沈啓口山水利考云長興荆溪以下泄入太湖之港凡三十有四舊傳七十有二吳越錢氏時港各有閘年久湮廢所存止此古今稱謂不同不可考伍餘福三吳水利考云諸漊界烏程長興之間岐而視之烏程三十九長興三十四總而計之共七十有三其圖畫所載名號古今不同訪之父老亦罕有知其詳者今大半湮塞湖濵居民嘗有自捐己資開濬深廣置閘啓閉之議而格於時勢事不果行環湖之水悉注于太湖微太湖民其魚乎所謂導水以疾趨太湖者水之道也決之而已矣議者謂朩簰魚籪樁橛之類皆能壅水亦一説也至于決太湖之水以放于海其事固在蘇松張鐸府志明永樂中夏公原吉治水東南有功吳人尸祝之正統間勢家奪水利溝防盡壞周文襄公治之才十餘年又壞景泰中李侍郎敏治之𢎞治中又壞徐侍郎貫治之正德末又壞李尚書充嗣治之隆慶中又壞海忠介公治之明名臣言行録按隆慶三年忠介公因飢興役借支軍餉及各處贓罰導河夫等銀五萬有竒開南倉口至黃渡平陸六十餘里後十年巡江御史林應訓開黃渡以西千墩上流三十餘里江亦加闊又三年副使許應逵奉敕開江求通反塞內帑十萬盡付東流海公遺迹不二十年復為平陸厥後巡撫曹時聘周啓元張國維巡按馬從聘薛貞歷有咨議費大莫舉崇禎元年員外蔡懋德疏言三吳水利輔臣亦有吳人為上言之上疑其勞民命撫臣議撫臣李待問適以擢漕督將去謂挑濬不可巳然人有言三江總開一勞永逸者有言物力難措先開吳松江而後徐議之者有言且就內河疏導其溝澮者而皆苦於費無所措上輒罷之上初念恐其勞民疑士大夫自為反以厲民耳惜無有為上言勞民所以利民雖小費而東南財賦之地國計根本則未有不汲汲行之者矣暇老齋雜記按三吳之水利在下流而吾湖之水利在漊港自宋迄元代有治績載在史册明洪武草七年遣國子生人才分詣天下郡縣督吏民修治水利草八年奏開天下郡縣塘堰凡四萬九百八十七處河四千一百六十二處陂渠隄岸五千四十八處載在實録時烏程縣主簿王福濬三十六漊港後典史姚章繼為之永樂以後自監司以及郡縣俱設有水利官專治農事每墟編立塘長即其有田者充之歲以農隙官率塘長循行阡陌間督其築修墟塍開治水道水旱之歲責其啓閉溝缺時其守護而檢報災數焉逮至中葉農政不修水利官漸次裁去所謂塘長者徒以勾攝公事起滅詞訟而已遑問其為水利哉近年沈樂存侍御上疏請開太湖下流并漊港章下所司勘覆不行因作東南水利編大指以為湖水為患要在疏橋口以出江濬江以達海而湖州所屬各漊港築隄置閘以捍風濤亦與疏濬相表裏要言不煩可當石畫也湖州當澤國上遊其為民政莫要於水利故安定先生在湖學特設水利一齋以教士子當時劉遂以水利名於官後世乃不講此是豈有用之學哉且太湖受天目諸山之水其治之之法不患源之不通而患流之不泄故蘇松興利之處即吳興去害之所由也近自吳江垂虹湮塞之後而吳興之害加甚為政者當思其泄水之處不必企仰於垂虹則凡所以思患預防多為之慮立必守之法資無窮之利庶幾不失安定先生立教之意則東南民力雖窮猶可勉為奔命以供賦役此區區屬望之念尤所加意云吳興掌故集康熙三十八年四月初四日上幸太湖凖吳縣百姓奏水東地方産去糧存上問扈駕守僃牛斗太湖幅員廣狹對周回八百五里上云為何具區志上止五百里對積年風浪衝攤隄岸故今有八百餘里上問去了許多地地方官何不奏聞開除對非但水東一處即如烏程之胡漊長興之白茅觜宜興之東塘武進之新村無錫之沙灣長洲之貢湖吳江之七里港處處有之上云朕不到江南民間疾苦焉得知道按太湖舊稱三萬六千頃魯公志已四萬八千頃矣水經注引韋昭云方員五百里牛斗所對又八百五里矣可見積年風浪齧去隄岸不知其凡幾也産去糧存之所民困極矣安能如水東成例一槩邀恩豁免也霅溪霅溪在烏程縣東南一里凡四水合為一溪自廣苕山曰苕溪自銅峴山曰前溪自天目山曰餘不溪自德清縣前北流至州南興國寺前曰霅溪東北流入太湖興國寺今廢為霅溪館太平寰宇記按霅溪之水東北過駱駝橋直出臨湖門分流於北者經奉勝門趨小梅港出太湖分流於東者折而北大會諸水於毗山漾直北趨大錢港出太湖又自駱駝橋南折而東過倉橋又東至歸安縣前過花樓橋直出迎春門東過八里店又東過舊館又東過南潯鎮入吳江平望之鶯脰湖霅溪館即白蘋館梁太守蕭琛建顔魯公改為霅溪館館後有碧瀾堂唐大中四年刺史杜牧建書史會要云牧善行書亦能大字嘗有分書碧瀾堂三字在湖州驛經二尺許茂密滿楠都欲滅縫世少識之紹興續編到四庫闕書目有碧瀾堂詩一卷墨妙亭有張逸碧瀾詩石刻今並不存駱駝橋唐垂拱元年造顔魯公書額東坡詩注以橋形似駱駝背名之談志云取駱駝知水性以鎮水非以形也劉禹錫詩駱駝橋上蘋風起鸚鵡杯中若下春蘇軾詩今日駱駝橋下泊恣看修網出銀刀毗山當城北突然鐲峙吳興之水口也山上舊有亭梁太守柳憚所創明一統志訛作唐之柳渾渾惲之六世孫也王氏讀史訂疑嘗辨證之倉橋舊名採蘋橋元時橋南有倉因改稱之花樓橋舊名人依橋最髙偽吳時剗平之覆以樓故曰花䄛唐韻霅水衆流之聲霅霅然三吳土地記云烏程縣東南有霅溪水至深處徐陵孝義寺碑云清霅瀰瀰深窮地根又字書霅者四水激射之聲故徐仲謀詩四水交流霅霅聲張世奕詩霅溪深極地根清四派交流激射聲李直方白蘋洲記五溪叢流而導其氣説者謂四水并霅水而五也鄭戩浮玉亭記霅水合四水則四水為霅有自來矣談志按輿地紀勝引皇朝郡縣志云自清源門入曰苕溪其流濁自定安門入曰霅溪其流清不過二溪耳且餘不溪與苕溪皆出天目山前溪雖出銅峴山然至德清縣東已與餘不溪合而北流至定安門外通謂之霅溪不待與苕溪合然後名之其説又與談志相左矣豫據諸書考之知郡中之水自西來者曰苕溪入清源門東過儀鳳橋至於江渚匯自南來者曰前溪曰餘不溪曰北流水三水會於峴山漾入定安門過潮音橋折為前溪匯灣過北東至於月河昔人所謂水晶宫也從月河西北隅過長橋至於江渚匯然後謂之霅溪今人誤以打柴灣為倒霅灣謂霅水自南來又誤以閘水橋為霅水橋謂霅水自西來至於苕水發源廣苕在天目山之隂湧幢小品云廣苕遍山生苕望之翩翩作鳯尾形苕水出焉自頂及麓處處涌溢山水草合而為一以此稱竒此苕之所由名也今人傅會苕水自南來創為南苕之號殊不知山海經言浮玉之山苕水出於其隂而未嘗言出於其陽也談志云統紀載興國寺在霅溪館西霅溪館今雙溪亭是也而烏程縣南浮玉亭舊名霅水堂縣西有霅水鄉二處所臨乃是苕水今餘杭乃有苕溪館定安門內有四水亭皆相承之誤湖州城中之水曰霅溪以四水奔會激射霅然有聲故名薛氏浙江通志按太平御覽引輿地志云霅水亦若水之異名也水深不可測俗謂之若水又山海經浮玉之山苕水出其隂中多鮆魚今亦謂之霅烏山也殊屬賞解唐一菴作烏程歸安二縣志俱云霅溪合苕溪前溪餘不溪北流水四水相合霅然有聲故名與談氏薛氏之説相合霅溪即江子匯在郡治南其源自南來者曰前溪曰餘不溪曰北流水三水會於峴山漾入定安門自西來者曰苕溪入清源門四水總聚於江子匯霅霅然有聲謂之霅溪又名霅川水利考霅川平波漫流有水之利而無水之害羣山環列秀氣可掬卜居於此殆復何加諺云放你生放你命放你湖州作去聲百姓此唐末五代之語是時天下皆被兵獨湖州獲免至於本朝太平又二百年靖康建炎復免兵厄今尚有唐末五代時屋宇夫為湖之百姓猶為至幸况為士大夫乎經鉏堂雜志按唐宋之時湖之百姓為生人至幸今大不然菰城文獻云湖民最苦四體焦瘁終歲不休無産者雇倩受直盡心殫力謂之長工夏秋農忙短假應事謂之忙工收穫之際公私責償而場遽空者十恆七八婦人事蠶夏初餵葉晝夜毋怠三眠之後繭白如山下繭繅絲辛勤備至至於貿絲而終身無得一繭者殆將遍於村落矣白蘋洲經典言蘋者多先儒罕有解釋毛詩草朩疏亦未為分了而湖州圗經謂之不滑之蓴大謬矣爾雅釋草云蘋大萍左傳云蘋蘩蕰藻之菜然則蘋為萍類根不隨泥生於水上今人呼為浮萍者是也入夏有花其色正白故謂之白蘋或曰蘋花夏生而柳惲詩汀洲採白蘋日莫江南春何也答曰以蘋花色白故通無之時亦可呼為白蘋也兼明書白蘋洲在霅溪東南去州一里有顔魯公芳菲亭洲內有池池中有千葉蓮今惟地名故址存焉太平寰宇記按魯公年譜白蘋洲上公作八角亭及茅亭不聞有芳菲亭也寰宇記或有所本樹萱録云張確嘗遊霅上於白蘋洲見二碧衣女子攜手吟詠云碧水色堪染白蓮香正濃分飛俱有恨此别幾時逢藕隱玲瓏玉花藏縹眇容何當假雙翼聲影暫相從確逐之化為翡翠飛去又珍珠船云湖州碧瀾堂素有奇怪宋郡士朝子芝嘗見一女子踏波而吟曰水天日暮風無力斷雲影裏蘆花色折得芙蓉水上遊兩鬢蕭蕭玉叉直吟畢由東岸而去或曰此皆水仙也吾不敢信姑存之以資談柄可也地名故址者即今之蓮花莊也爾雅荷芙蕖其莖茄其葉蕸其本蔤其華菡萏其實蓮其根藕其中的的中意今俗荷皆謂之蓮千葉蓮者不但以實為華且以華為葉矣會昌一品集重臺芙蓉賦序云吳興郡南白蘋亭有重臺芙蓉本生於長城章后舊居之側移植蘋洲至今茂盛郭璞注荷别名芙蓉江東呼荷本草衍義云荷花粉紅千葉白千葉者皆不實薑堯章云吳興號水晶宫荷花盛麗陳簡齋詞今年何以報君恩一路繁花相送到青墩蘇東坡守湖時與王郎昆仲及兒子過繞城觀荷花詩云環城三十里處處皆竒絶浦荷浩如海時見舟一葉唐刺史楊漢公疏四渠濬二池立三園建五亭以復顔真卿之舊白居易為文以記曰以其架大溪跨長汀者謂之白蘋亭介二園開百卉者謂之集芳亭靣廣池目列岫者謂之山光亭玩晨曦者謂之朝霞亭狎清漣者謂之碧波亭其建置也始則太守柳公濫觴之次則顔公推輪之終則楊公繪素之又曰五亭間開萬象迭入今五亭已不存五亭碑記白居易撰馬纘書開成四年建白蘋亭碑記李直方撰史鎬書元和元年建俱在墨妙亭白蘋洲碑記在州大廳壁中中和五年刺史孫儲撰進士王溥書輿地紀勝吳興山水清逺城據其會狀其景者曰水晶宫楊漢公詩吳興城闕水雲中畫舫青簾處處通溪上玉樓樓上月清光合作水晶宫曰水雲鄉王唯正詩苕溪水雲鄉蘇東坡詩方丈仙人出渺茫髙情猶愛水雲鄉曰極樂國林希上地圗詩繞郭芙蕖拍岸平花深蕩槳不聞聲萬家笑語荷花裏知是人間極樂城城之內觸處見山觸處可以引溪流俞秀老詩沽酒店穿斜巷出採蓮船傍後門歸翠沾城郭山千點清蘸樓臺水一圍故凡為苑圃必景物幽雅雖近市如在雲巖江村所以為趣也唐開成中白蘋洲有三園錢氏時清源門內有芳菲園國朝寶元中定安門內有南園今廢為庾廪矣居宅矣招提矣園之亭館自白蘋外俱不可見鄉老寓公多為芳圃亭宇相望沼沚旁聨花木蓊茂遊者爭眩物固不能兩盛也談志白蘋洲考其名始於柳太守之詩至顔魯公為郡始葺八角亭後楊漢公拓為五亭至光啓中李師恱廢而為倉宋朝以為秀王大府至元泰定復為倉今為𢎞文館李直方白蘋洲記乃謂吳江之南震澤之隂為湖州巳謬至云洲在郡城東南則又似列於城外明洪武中土人有作記者乃云在江子匯之西尤謬矣吳興掌故集按癸辛雜識云吳興郡中二溪橫貫此天下之所無故在在多園池之勝豫嘗聞之善遊者言足迹遍天下而城垣以內之水有溪有漾有河有瀆有潭有洲未有如吳興之深且廣者崖岸多生紅蓼曰紅蓼灘曲洧舊聞云紅蓼即詩所謂遊龍也俗呼水紅詩傳云龍紅草箋云遊龍猶放縱也紅草放縱枝葉於隰中疏云一名馬蓼葉大而赤白色生水澤中髙丈餘今月河蓮莊一帶蓼紅蘋白當夏秋之交花影參覃水尤瀲灩扁舟泛焉不減武陵源也石柱記箋釋卷四
