body:
  text: 石柱記箋釋巻五歸安鄭元慶撰徳清縣徳清天授二年分武康置武源縣景雲二年改為臨溪天寶元年改為徳清縣舊唐書唐初置武源縣縣治在下蘭山南天寶中改徳清移置於百寮山南談志市亭山市亭山在縣西南二百歩王敬𢎞涖郡欲此立宅以其靣谿背山也呉興記古十里一亭以寓止賔旅因以名山圖經按宋書王敬𢎞晉末以太尉從事中郎出為呉興太守尋拜侍中入宋歴左光禄大夫開府儀同三司致仕隱居餘杭舍亭山德清在宋齊之間正并入餘杭故德清之市亭山即餘杭之舍亭山也呉興記以敬𢎞作逸少誤今正之金鵞山金鵞山上有池深五尺其水冬夏不竭時有金鵞翔集或風清雨霽樵夫耕父聞山上鵞鳴山墟名按金鵞山在縣西北五里談志云後漢海昬侯沈戎于永平元年葬金鼇山葬時金鵝飛集三鳴而去童謡云金鵝鳴沈氏興代代出公卿遂更名其山曰金鵞今山南有三村號上初鳴中初鳴下初鳴山上有沈氏祖德碑記梁天監癸未春三月系孫麟士述唐大歴癸丑冬十二月刺史顔眞卿撰碑隂記二記文多不載復齋碑録云沈氏遞祖徳碑并碑隂下半缺不見書撰人名氏大歴八年十二月立德清陳志云梁沈氏祖德碑沈麟士製立之金鵞山忽有樹生其龜股間盤旋夾持碑有所倚嶷然不動號慶樹碑後裂為十六叚藏之縣帑今無一存焉者矣再按山上有四墓一沈戎一尚書令沈禮一河間相沈景一荆州刺史沈彦統記載沈氏先賢傳諸書云沈戎子孫見史傳者一百五十八人三十八人有正傳一百二十人附傳宋梁陳間皇后三人尚主者五人唐睿眞太后亦呉興人至今人物稱盛金鵞發祥地理果不爽乎吳𦍑山漢髙士吳𦍑避王莽之亂寓居此山後人名焉宋沈麟士講經教授於此從學者數百人時為語曰吳𦍑山中有賢士閉門教授居成市入東記縣東南一里吳𦍑山俗呼乾元山當縣而峙蓋邑之鎮也山之陽有織簾先生祠祀名賢沈麟士麟士織簾為業時稱織簾先生卒後鄉人重之即其隠居立廟廟前古井相傳先生舊井廟後其墓在焉徳清陳志按呉𦍑山之隂枕餘不溪沈麟士隱居於此南史云麟士居呉差山南齊書亦云居餘干呉差山以𦍑為差以餘不為餘干殆傳寫之譌邑中胡朏明先生語予曰安知非以呉王夫差得名則又不敢臆斷也餘不溪餘不溪在縣南一百歩沈氏家傳云後漢沈戎居烏程餘不郷即此類要餘不溪水清與餘溪不類如㑹稽秦望其山秀發餘山莫與等也太平寰宇記餘不溪出天目山之陽經臨安縣又經餘杭縣至安溪奉口經徳清縣折而東北至敢山過菱湖及湖蚨漾又西北㑹前溪水至峴山漾入定安門至江子匯為霅溪談志按留青日札云不作秋韻方鳩切非也當作虞韻風無切木作柎說文鄂足也草朩房為柎一曰花下萼通作不詩棠棣之華鄂不韡韡鄭注承華者鄂不當作柎鄂足也即今言花蔕也此地有苕溪其流相通故曰餘英餘不其義可見若作方鳩切則本注說文云不鳥下翔不下來也與溪水全不干渉李宗諤圗經及寰宇記通作方鳩切北流水北流水在徳清縣前其水從餘不溪至縣東分派折入清河橋下北流至沙村與武康前溪水合又北至峴山漾與餘不溪合入定安門至江子匯為霅溪談志苧溪苧溪在縣東二十五里山墟名云苧溪以貢苧為名南岸有藺相如廟北岸有青州刺史姚恢囚女城太平寰宇記按通典云湖州貢苧布三十端通志略云湖州貢白苧布則唐時所貢之苧本出於此乂按相如趙人當戰國時未嘗游行至此縣有蘭村溪南有廟未審何故入東記云後漢姚恢與海昏侯沈戎為婚過江隂欲於柯田山居之恢女宻報戎戎先居焉姚氏三代不養女養女則囚於此山後人因呼為囚女山其說誕甚不足信餘不亭侯廟孔愉字敬康山隂人建興初除駙馬都尉參丞相軍國事討華軼功封餘不亭侯嘗行經餘不溪見籠龜於路者愉買而放之龜中流左顧者數四及是鑄侯印而印龜左顧三鑄如初印工以告愉乃悟遂佩焉累遷吳興太守沈充反愉棄官還京師歴㑹稽内史散騎常侍卒贈車騎將軍開府儀同三司諡曰貞晉書餘不亭侯廟在徳清縣東南二百歩自晉迨宋廟食不絶談志按縣西南城山之陽亦有孔侯廟圗經云愉從子嚴為呉興太守後人立廟於此舊圖經云即愉也縣南之廟乃祭祀之處此則墓前祠堂餘不志亦云孔侯墓之祠堂後人因以為廟廟後有大冢上有古木數株堅如鐵石故老相傳愉塟後龜銜窠木種於此至今號龜銜樹驂鸞録云范至能嘗道龜溪登覽於廟時見愉之像席地而坐廟前古柏合抱焉今像設據榻而古柏絶無則知廟非唐宋之故矣梁吏部尚書沈約墓沈約字休文武康人仕宋至尚書度攴郎齊初為征虜記室帶襄陽令事文惠太子歴司徒左長史進號征虜将軍南清河太守佐蕭衍簒位弑齊和帝梁臺建為尚書左僕射封建昌縣侯累加特進光禄侍中太傅卒有司諡曰文帝曰懷情不盡曰隠故改諡隠梁書孝鵝冢唐天寶末邑人武義主簿沈朝家養母鵝一因育卵腸出乃自驚鳴鼓翅竄於波渚之隅其長雛悲呌屢絶家人飼之水榖不復飲啄及母鵞死雛仰天號切遂取倉舎下敗薦以覆其母銜庭砌間芻草列於母所若人之祭奠長吁數聲而死沈氏家人因作二函薶於山中土人呼為孝鵝冢太平寰宇記按一統志列孝鵝冢在長興縣東蔣彎者非也沈約歴事三朝恬不知恥至弑其君而不顧眞禽獸之不若矣其諡曰隱隱者貶辭呉興故有地主廟祀呉文帝而約竊冒之扁曰隱侯祠春秋血食祀典之濫也夏明誠嘗作八詠樓賦序直斥沈約詩為是樓之辱人服其卓見寰宇記類要俱志其墓不明著所在胡宿詩注云在縣之藺村湖廣通志云約卒於荆門州墓在州西墓銘云時日不利不能歸葬則是約之墓終無定所也竹垞先生補志其墓與鵞冢竝列約其有知能不恧而武康縣吳興武康令吳分烏程餘杭立永安縣晉太康元年更名宋書武康平陳廢仁夀二年復有封嵎山青山白鵠山隋書按封嵎即封禺二山也青山縣北一十五里白鵠山縣西北十里一名鵲山武康上李子通置安州又曰武州武徳四年平子通因之七年州廢縣𨽻湖州有封山有銅新唐書縣治舊在餘英溪北隋移溪南唐仍治溪北談志防風山防風山在縣東一十八里先名封禺山唐天寶六年敕改焉一名風公山一名風渚山古防風氏之國公者以山上有風公洞渚者以山下有風渚湖封山者以其禁采樵漁獵也山東南二里曰禺山禹十二代孫帝禺所居輿地志云古防風氏之都也太平寰宇記吳伐越隳㑹稽獲骨一節專車吳子使來好聘問之仲尼仲尼曰吾聞之禹致羣臣于㑹稽之山防風氏後至殺而戮之其骨專車焉此為大矣客曰敢問誰守為神仲尼曰山川之靈足以紀綱天下者其守為神社稷之守為公侯皆屬于王客曰防風何守仲尼曰汪芒氏之君守封禺之山者也為漆姓在虞夏商為汪芒氏于周為長翟今為大人客曰人長之極幾何仲尼曰焦僥氏長三尺短之至也長者不過丈數之極也國語按防風氏有廟在封禺二山之間晉元康中縣令賀循立述異記云防風廟土朩形其貌龍首牛耳連睂一目武康山武康山在縣西一十五里舊名銅官山唐天寶六年敕改焉輿地志云山下有兩坎深數丈方圎百丈古采銅處有趙監廟漢吳王濞鑿山采銅銅監趙氏遇山崩壓死降靈於此後人立廟太平寰宇記按舊志郡中亦有銅官趙監廟在烏盆巷口與長橋相直後唐同尤中敕封通靈王却埽編云銅官廟中偶像衣冠甚古其婦人皆如世所藏周昉畫人物蓋唐人之遺蹟也翟公㢲尢愛之多至廟中觀焉往往徘徊終日今訛作漢夀亭侯祠七里嶠七里嶠山頂有石橋長一丈六尺甚峻滑一名石橋山山墟名石嶠山在縣西南四里一統志七里嶠度其圍以表山也南有嶗嶺過嶺而東康城又北為烏龍山南為寨山中有畈曰寨山畈有祠焉兜鍪被甲執戈而坐其神曰嚴康相傳康屯兵處人代莫詳野老之言曰康邑人也竒醜而力爪牙為兵革膚為鐵刀鏃莫之刺也唯喉三寸肉耳妻曰鮑三孃美而勇夫婦各治兵為幕府今姚塢關内鮑家莊有三孃遺壘時有花關索者年少美容儀鮑恱而私之矢貫康㗋而噎至今村莊雜劇演其遺事而康城廟像歳祀夫婦二人别祀索於何村獨無匹里人號曰孤土地廟云康怙力強死世祀里社鮑滛奔殺夫鬼復配享花竊妻暴行祠宇相望是崇姦教亂也何以風世且康不能厲廟不為災意者傳聞乖實乎姑志之以廣風土之異聞前溪逸志按陜西通志商南縣有亷康太子墓世傳太子三國時人炎祚衰微據土僭號為關鎻所平歸安縣西南七十五里有亷山新志注云亷康太子墓在此不知何據烏程北山亦有鮑三孃屯兵處俚俗相傳三孃為花關索所平如前溪逸志所云略同嚴亷索鎻其音髣髴何適與秦志相類邪總之湖俗信鬼神好淫祠山之麓水之涯有村落必有廟宇奉一神以主香火而好事者遂至訛傳周彭祖安吉人齊管仲烏程棲賢山人晏嬰長興晏子郷人呉伍員烏程伍村人燕荆軻長興荆溪人趙藺相如德清藺村人漢樊噲武康丄柏人晉王衍歸安千金人郭巨孝豐鄉人紛紛傅㑹唐宋以後更指不勝屈修志者並不考覈混書之惑人耳目吁可怪也前溪前溪者古永安縣前之溪也晉車騎將軍沈充家此樂府有前溪曲充自製詞云當曙復未曙百鳥啼悤悤後宋少帝續為七曲其一云憂思出門倚逢郎前溪渡莫作流水心引新都舎故統紀前溪一名餘英溪每春夾岸花開通夏不歇山墟名前溪在縣南一百歩其源出銅峴山東流四十九里至縣前千秋橋又東至縣學前分為二派其一北流經黄隴山又東至沙村號沙溪與徳清縣北流水合入郡之定安門經前溪匯在慈感寺前至霅溪其一東流經下渚湖之南㑹於餘不溪武康縣後又有一溪亦出銅峴山謂之後溪談志于兢大唐傳徳清縣南前溪村南朝習樂之處今尚有數百家習音樂江南聲伎多自此出所謂舞出前溪者也復齋漫録言陳劉刪詩山邉歌落日池上舞前溪唐崔顥詩舞愛前溪妙歌憐子夜長按智匠古今樂録晉車騎將軍沈充作前溪曲非舞也蓋復齋不曽見于兢大唐傳故不知舞出前溪耳漁隠叢話阮公溪石靈寶者㑹稽上虞人寓武康其女有殊色天監元年選為采女及生元帝為修容賜姓阮氏拜其父為奉朝請時人名所居溪為阮公溪靈寶以承聖二年追封武康侯溪中有大青石俗謂之美女石梁陳故事阮公溪在縣西十五里與餘英溪連接太平寰宇記郭先生祠堂武康有郭文先生廟堂九域志郭先生祠堂在縣北郭林村晉郭文也文河内軹人中原亂避地江南居此謝安聞其名延至西園祠南有郭林橋西有招賢山皆其遊息之地談志沈道䖍石山精舍沈道虔字汝恭武康人性仁愛好老易居縣北石山下與孤兄子共釜庾之資困不改節州辟凡十三命皆不就宋太祖遣使存問賜錢三萬米二百斛悉供孤兄子嫁娶徵為員外散騎侍郎不赴敕州郡隨時問遺元嘉二十六年卒宋書按一統志石山在縣北二十里沈道䖍隠居石山精舎即此太平寰宇記云精舎在石城山縣西南三里者非也吳太常卿姚信墓漢青州刺史姚恢尚書左僕射姚皓吳太常卿姚信三墓俱在石城山景徳中碑碣尚存談志按阮孝緒云姚信字元直呉興人呉太常卿陸德明云信字德祐未知孰是隋經籍志信有易注十巻集二巻録一巻唐藝文志作十巻士緯十巻新書二巻三國志陸績傳注有表請賜績女鬰生以義姑之號又陸遜傳姚信以親附太子枉見流徙又孫皓傳寶鼎二年十二月遣守丞相孟仁太常姚信等備官僚中軍步騎二千人以靈輿法駕東迎神於明陵又南史姚察傳譲選部書云臣九世祖信名髙往代信有戒子書及昕天論載呉興藝文補九域志載姚信丁固二墓寰宇記亦載固墓按丁固葬餘杭縣西丁橋北山下見宋咸淳臨安志晉吏部尚書沈嘉墓沈嘉墓在縣東一十五里鳳皇山山下有皇覺寺漢沈戎故宅也談志按嘉字長茂武康人善草書仕晉為呉興太守重開荻塘人獲其利歴吏部尚書卒晉揚威將軍東陽太守沈勁墓沈勁字世堅武康人哀父充死於非義志欲雪恥年三十餘以刑家不得仕進郡將王胡之器之及遷鎮洛陽表為參軍升平中慕容恪侵逼山陵勁求効力補冠軍長史令自募壯士擊賊㑹許昌寇逼將軍陳祐率衆而東留勁以五百人守洛陽恪攻城城䧟被執勁神氣自若恪殺之事聞贈東陽太守子赤黔官至大長秋廷尉卿孫叔任官至建威將軍益州刺史晉書沈勁墓在小山赤黔祔焉談志宋吏部尚書吉陽侯沈演之墓沈演之字臺真武康人祖赤黔父叔任演之折節好學以義理業尚知名襲父别爵吉陽縣五等侯舉秀才歴嘉興錢塘武康令俱有能名元嘉十二年東南諸郡大水演之為散騎常侍巡行拯恤百姓䝉賴屢遷左衛將軍與范曄等掌禁旅同參機宻加侍中歴吏部尚書太子右衛率卒贈金紫光禄大夫諡曰貞侯宋書演之墓在小山談志石柱記箋釋巻五
