body:
  text: 石柱記箋釋巻一歸安鄭元慶撰湖州石柱記文字殘缺其存者僅可識讀考其所記不可詳也唯是筆畫竒偉非顔魯公不能書耳公忠義之節明若日月堅如金石自可以光後世傳無窮不待其書然後不朽然公所至必有遺跡故今處處有之唐人筆蹟見於今者唯公最多視其鉅書深刻或託於山厓其用意未嘗不為無窮計也蓋亦有趣好所樂爾其在湖州所書為世所傳者唯干禄字書放生池碑尚多見於人家而干禄字書乃楊漢公摹本其真本以訛缺遂不復傳獨予集録有之唯好古之士知前人用意之深則其湮沈磨滅之餘尤為可惜者也集古錄石柱記殘缺不見年月及書撰姓名其字畫顔魯公書也凡湖州諸縣皆記其山川前古陵墓集古録目石柱記舊在杼山今在墨妙亭輿地碑記目按魯公年譜大歴七年壬子公年六十四九月至東京除湖州刺史十一月發東京八年癸丑正月至任七月追建放生池碑銘是年有題三癸亭酬陸處士折青桂花見寄詩水堂送諸文士戲贈潘丞聮句十二月有沈氏述祖德碑隂記𤣥靖李先生碑銘公在郡及門生弟姪遊峴山觀左相石罇聮句九年甲寅正月作干禄字書序書於刺史宅東㕔院韻海鏡源纂成三百六十巻是年有乞御書題額恩敕批荅碑隂記妙喜寺碑贈僧皎然詩十年乙卯有元次山表墓碑銘歐陽領軍碑銘十一年丙辰四月有崔孝公陋室銘記初霅溪東南有白蘋洲梁太守柳惲江南曲汀洲采白蘋日暮江南春後人因以名洲至是公始剪榛導流作八角亭及茅亭書惲詩於上有康使君碑銘十二年丁已公年六十九四月有柳惲西亭記是月内召五月有項王碑隂述呉興集尚書年譜八月為刑部所載魯公刺湖事績如此獨不及石柱記故不知其作於何年考之唐㑹要烏程縣大歴十二年二月二十一日新陞望公記烏程注云舊緊今望則知其為十二年二月後所作也時公膺召尅期進都猶㽞心郡事勒之貞石用垂久逺更數百年風雨剥蝕薶没荒山非孫莘老力為收貯幾乎不與蠶頭鼠尾碑胥歸銷滅也邪謹識之見魯公用意之深且以補年譜所未逮云湖州沿革湖州禹貢揚州之域斗牛之分清𩔖天文分野之書士防風氏之國也春秋時吳地後屬越越為楚所滅屬楚十道志楚為菰城即春申君之邑方輿勝覽秦始皇二十六年置㑹稽郡改菰城為烏程縣隸㑹稽又置故鄣縣隸鄣郡呉興記秦始皇至㑹稽徙大越之人于烏程越絶外傳烏程故鄣漢屬㑹稽丹陽二郡東漢屬呉郡吳孫皓分置吳興郡晉宋齊因之輿地廣記梁紹泰元年改吳興郡為震州蓋取震澤為名陳初罷州復為郡元和郡縣志隋仁夀二年改吳興郡為湖州太平寰宇䚰五湖之表州以為名也郡國志隋煬帝初廢湖州分其地入餘杭及吳二郡通典唐武徳四年平李子通置湖州天寶元年改吳興郡乾元元年復為湖州舊唐書湖州吳興郡上土貢御服烏眼綾折皂布綿綢布紵糯米黄疑作糙紫筍茶朩𤓰杬子乳柑蜜金沙泉戸七萬三千三百六口四十七萬七千六百九十六縣五烏程望長城望安吉緊徳清上武康上新唐書按談鑰呉興志唐歳貢御服折造布二百九十端紫筍茶一萬串又供尚食㕑糙糯米一千三百八十三石有奇黄糙米一百九十八石朩𤓰糝四坩朩𤓰煎三坩單杬子一千三百五十顆重黄杬子一千三百顆又白蜜三石砂盆一百枚金沙泉一銀缾乳柑五百個統記云龍德三年貢布三十端供御服折造布二百九十疋大歴六年始進朩𤓰糝大歴元年進木𤓰煎單黄杬子二年進白蜜重黄杬子五年進黄糙米貞元十三年進糙糯米十四年進砂盆十五年進元和五年減米六十六石本郡未嘗經兵火架閣典籍具在統記興國中攝長史左文質纂有所考據故所載年代數目可以補史之遺缺又按唐之歳貢如烏眼綾綢布紵唐初所貢數雖不詳統記載龍德三年貢布三十端可見其不多矣供御服折造布與木𤓰杬子茶蜜大歴元年至六年始進唯是以兩稅錢和市供故不至甚病民糯米黄糙與砂盆貞元十三年至十五年始進至元和中米已三損其一乳柑不載所進之年紫筍茶大歴五年始於顧渚置貢茶院院側有碧泉涌沙粲如金星則金沙泉亦大歴後所進也唐自髙祖太宗以仁慈保養天下物貢有常未嘗妄取下迨肅宗不聞更易大歴貞元之間洊經兵革貴官用事口腹之奉責貢於逺不憚煩費累増不已亦足見唐室盛衰之故矣宋初呉越歸命郡始修貢每歳唯貢乳柑編布記所茶角唐數己瓶泉又減茶泉如統載視大歉故舊圗經唯載柑布二物後巳免進柑故九域志唯載白紵二十疋漆器三十事紹興以後又獨貢白編布而已宋世相承以節儉為家法先王所謂物土之宜而致其利者代益以損可為萬世法按夫戸口者租庸調所由起也唐之口四十七萬有竒今止二十九萬有竒唐之租庸調其數己不可考今銀則四十萬四千有竒米則三十九萬一千有竒苕霅野史曰有田則有租有家則有調有身則有庸古之制也今庸浮於調調過於租而租又居天下三分之一嗚呼蘇湖熟天下足和以滋味養以參苓毋勞手足衞我腹心德清陳志曰呉中之田賦役之重視他道較甚推厥弊源呉越以貢獻之故而賦斂者重南宋以和糴之困而經量者密賈似道之公田甚於經量張士誠之横賦劇於呉越是故版籍相仍官田之多幾半於民而科則之緐莫革其弊真隠齋槀曰以一夫十畞之家論之一夫終歳勤動可耕十畞一畞米二石亦稱有年計為米二十石一夫食用可五石而嬴蓋所存止十石矣實徴銀米畝可六斗而辦餘米止四石耳而妻孥之待哺衣縷之蓋形皆取資焉又有遞年因糧耗費因銀銷費不在此數以畞之所入較糧之所出則收穫雖極豐稔所餘無幾而民力竭矣戸口安得不消耗邪按呉初置呉興郡領九縣烏程永安餘杭臨水陽羨故鄣安吉原鄉於潛晉析烏程置長城東遷為縣十一後割陽羡置義興郡為縣十宋以故鄣屬丹陽歴齊梁陳仍九縣隋平陳郡廢縣或并省各他屬仁夀二年以武康烏程長城三縣置湖州未幾復廢唐武德四年復置湖州止領烏程一縣七年始以武康長城來屬又并安吉原鄉入長城麟德中復置安吉天授中析武康置武源尋改臨溪又改德清乾寧三年陞湖州為忠國軍終唐之世凡五縣後梁開平中以武康屬杭州後周顯德中改為湖州宣德軍宋仍之太平興國四年復武康七年析烏程置歸安為縣六景祐元年改為湖州昭慶軍寳慶二年改湖州昭慶軍為安吉州縣仍為六元為湖州路陞長興為州餘五縣如故眀為湖州府長興仍為縣陞安吉為州析安吉置孝豐定為一州六縣至今不改烏程縣宋太平興國七年分烏程東南十五郷置歸安縣因吳越錢氏初歸命故名與烏程對治俱附郭舊緊今望郷四十里二百東去蘇州二百一十里南去杭州一百八十九里西北去揚州六百四十七里西去宣州三百一十七里北去東都二千八百七十五里北去上都三千七百七十六里按元和郡縣志州境西北至上都三千二百四十里西北至東都二千二百四十里至宣州三東北至蘇州二百一十里正南微北百七十里東北至常州和睦路三百里東至杭州私路一百九十里杜氏通典呉興郡東至呉郡三百一十里南至餘杭郡一百九十里西至宣城郡三百八十七里北至呉郡二百一十里東南到餘杭郡鹽官縣界一百七十二里西南到宣城郡界二百六十一里西北到晉陵郡三百三十二里東北到呉郡二百二十二里再按太平寰宇記九域志談志俱與記互異秦置烏程縣介於㑹稽鄣二郡之間清類天文分野之書秦時烏巾程林以釀美酒縣因得名吳興雜録㑹稽郡烏程有歐陽亭漢書注吳郡烏程左傳襄公三年楚伐吳至於衡山杜預曰在縣南或云丹陽縣之横山去鳩兹不逺子重所至也吳興記曰縣西北卞山有項羽祠興平二年太守許貢奏分縣為永安縣續漢書注吳興烏程令漢舊縣先屬吳宋書吳郡烏程舊置吳興郡平陳郡廢并東遷縣入焉仁夀中置湖州大業初州廢有卞山隋書烏程望東一百二十三里有官池元和中刺史范傳正開東南三十五里有淩波塘寶歴中刺史崔元亮開即歸安之菱湖今成鎮市北二里有蒲帆塘刺史楊漢公開開而得蒲帆因名有卞山有太湖新唐書烏程縣治舊在子城内晉義熙六年始移今處唐太和二年縣治生蓮花名蓮花閣菰城文獻按子城即今府治周一里古烏程縣治呉興郡舊城也統記云秦時為項羽故城唐武德四年趙邵王孝恭始於外築羅城周二十四里而以子城為刺史廨署談志云舊傳郭璞欲移郡於東遷每立標輒為飛鳥銜去其女亦善地理啓璞毋徙因舊址損益之可以永無殘破之虞璞從之其女今號遷城小孃子從璞廟食續圖經云郡置於吳而璞當晉惠懐之際避地東南事不相𩔖乃於菰城云秦改縣為烏程至晉始移於苕霅之上烏程縣治即古郡治又自相牴牾切詳烏程治所當秦漢間已徙今之郡中故呉寳鼎置郡詔謂永安故鄣等水悉注於烏程若在菰城豈得云此夫旣以縣為郡則必即縣治為郡治而縣治他徙矣璞隨元帝渡江仕為尚書郎損益古城之制相隂陽審向背庸有是理今羅城内苕水入西門餘不諸水入南門至江渚匯合為霅溪出北門趨太湖西南諸山屛列於前北有弁山盤踞於後子城居中受衆水之衝挹羣山之秀又四面多大溪廣澤故立郡以來永無兵革之患意非璞不能定不必引飛鳥以神其事也載按郡置於呉寳鼎即縣治為郡治距晉義熈計一百五十餘年縣治他徙何所舊志不詳又郡治為項羽故城晉宋齊梁間二千石至皆畏羽為厲祀之㕔事而避居他室天監末蕭琛守郡始遷去之仍為太守㕔事載在史冊今俗傳府治為梁沈約故宅稱呉興地主不知始自何人說鬼說夢也因記縣治附及之帝顓頊冢晉初衡山見顓頊冢有營丘圖衡山在州之東吳興續圗經或疑顓頊都帝丘今濮州是無縁冢在此古今流傳雖不可盡信然舜葬蒼梧禹葬㑹稽何必其都邪今州之杼山相傳夏杼巡狩所至杼夏之七王也禹葬㑹稽則杼之至此固無足怪庸俗之言未可為全無據也避暑錄話予攷皇覽云顓頊冢在東都濮陽縣頓丘城門外廣陽里中山海經云顓頊葬鮒嵎之陽魯公何不深究遽信圗經之說吳興掌故集山海經鮒嵎之山漢水出焉帝顓頊𦵏於其陽九嬪葬於其隂水經沔水注引之鮒嵎即嶓冢在今陜西寜𦍑州北九十里與沔縣接界帝王世紀顓頊葬濮陽頓丘今直隸開州是濮陽帝顓頊之墟故曰帝丘見左傳謂陵在頓丘者是開州即濮陽也今祀典亦在此地三餘漫鈔水經注南嶽岣嶁山下舜廟南有祝融冢楚靈王之世山崩毁其墳得營丘九頭圗非吳興之衡山也且祝融火官亦非顓頊續圖經本以衡山傅㑹魯公沿誤蓋亦未之考也石虹日記吳大帝陵大帝陵在上元縣東北蔣山八里太平寰宇記按呉志孫權本傳權薨諡大皇帝葬蔣陵丹陽記云蔣陵因山為名六朝事迹云今蔣廟相對向西有曰孫陵岡是為蔣陵是大帝陵確有定所也權太子和以皇后失寵廢為庶人徙故鄣改封烏程侯遣之國後薨葬弁山子皓即位追尊為文皇帝墓曰明陵呉興記云西陵山孫皓改葬父和於此即弁山之别嶺也記作大帝蓋文字之譌耳文帝有廟在儀鳯橋南呉志寳鼎元年冬十月永安山賊施但聚衆數千出烏程取明陵上鼓吹曲蓋比至建康衆有萬人丁固等逆戰但敗走尋滅因詔立呉興郡以藩衞明陵命太守四時奉祠此呉興設郡所自昉也幷建廟郡中後人稱為呉興地主廟西呉里語云呉文帝廟宋崇寧中訛作沈約祠菰城文獻云嘉靖九年知縣戴嘉猷毁其像撤其祠二十四年又復之今稱沈為著姓約為地主有司以時致祭於是天下競稱呉興有地主沈云呉興沈氏竹墩馬要族最著竹墩祖元三史纂修官國祥馬要祖元撝和處士德竝未嘗逺追武康德清諸沈或祖建威將軍林子或祖侍中司空慶之或祖織簾先生麟士雖同本述善侯亦不祖休文譜牒具在班班可考也而謂沈為著姓約為地主義何取乎况呉文帝以嫡嗣而遭廢黜小心翼翼恪守侯封毋論其肇造呉興即以揆之忠孝大倫允稱無媿祀典亦可以不廢今訛作約祠有司以時致祭其與祭法義又何取乎抑不特此也如郡中銅官趙監廟孃孃訛作武安王廟昇山沈將軍祠訛作廟道塲山東坡書院訛作觀音堂竹墩朱奉議文公長春書院訛作三官道院忽又訛作徽國祠愛山臺安吉趙太守為其婦幸列祀典忽借池州殉難趙通判之婦忽借本州殉難徐提刑之子為其子訛作節義成雙男女雜沓寄食叢祠當事不及聞吾輩不致辯嗚呼魂一變成虹血三年藏碧豈無靈爽豈無怨恫森森熌熌神杳杳以何歸慘慘悽悽恨深深而莫訴嗚呼是誰之過與吳景帝陵孫吳景帝葬定陵吳志不言所在南畿志云在太平府城東凌家山魯公又記之均屬可疑近年海寜祝仲基家一日有僧叩門請齋祝與之僧留不去逾月告祝堂側有窖珍寶無算導祝篝火掘之有隧道數百歩見石門金戸環兩狻猊坐門左右中樹一碑隸書吳景帝陵門堅閉不能發期以次日發之適祝以小過責僕僕潛赴縣告訐縣令遣吏且至祝亟塞之而賄隸以事虚覆乃止予聞諸家孝亷近修時祝尚存惜未及親詢之也竹垞說證鈕皇后陵魯公記吳景帝陵後即繼以鈕皇后陵勞鉞志著姓謂吳景帝有鈕后然吳志孫休止有朱夫人竝無鈕后惟陳武帝后章要兒本姓鈕永定元年正位中宫太建二年崩諡宣太后祔葬萬安陵建康實録云萬安陵在縣東南古彭城驛側六朝事迹云今縣東崇禮郷地名陵里有曰天子陵其地有石麒麟二里俗相傳即陳髙祖墓然則鈕后之葬亦在金陵矣陳書章皇后父景明追封廣徳縣侯母蘇拜安吉縣君安吉君卒與后父合葬吳興竊疑魯公所記鈕皇后陵殆其父母墓爾頃聞之茝畦云十年前天寜寺西南居民馮氏堂後地忽䧟窺之得空穴中縣二棺土人層級而下隂風刮靣遂出以土覆之天寜寺為鈕氏捨宅建則此或即后之父母墓未可知也竹垞說證按舊志青塘在迎禧門外呉景帝鈕皇后父葬卞山令百姓開之以通墓所自城入法華寺路也據此則呉景帝果有鈕皇后矣然云父葬卞山亦不當以景帝鈕后二陵並載也呉丹陽太守蕪湖侯太史慈墓太史慈字子義東萊黄人仕郡奏曹吏北海相孔融以黄巾寇暴出屯都昌為賊管亥所圍慈從遼東還赴融求兵出斫賊融不聽而圍日逼融欲告急平原相劉備慈自請求行到平原說備備即遣精兵三千人隨慈賊聞兵至解圍走揚州刺史劉繇與慈同郡慈往見之㑹孫策至或勸繇可以慈為大將軍繇曰我若用子義許子將不當笑我邪但使慈偵視輕重獨與一騎卒遇策便可鬭正與䇿對得其兜鍪繇奔豫章慈為䇿所執即解縛捉其手曰寜識神亭時邪即署門下督還呉授兵拜折衝中郎將繇亡於豫章士衆未有所附䇿命慈徃撫安焉還為建昌都尉治海昏卒吳志太史慈葬于新吳今洪府奉新縣也邑人立廟敬事乾道中封靈惠侯予在西掖當制其詞曰神早赴孔融雅謂青州之烈士晚從孫䇿遂為吳國之信臣立廟至今作民司命攬一同之言狀擇二美以建侯庻幾江表之間尚憶神亭之事蓋為是也容齋二筆太史慈墓在奉新縣南郷十都地名感古江西通志按慈墓郡志俱不書惟烏程徐志傳會云在法華寺東石塢吳大將軍朱治墓朱治字君理故鄣人漢末為縣吏州辟從事隨孫堅征伐累遷督軍校尉堅卒奉孫策平江東定㑹稽領太守事䇿亡奉孫權為九真太守行扶義將軍征討夷越佐定東南黄武元年封毘陵侯二年徙封故鄣卒贈大將軍吳志朱治墓在歸安縣南一十二里談志吳蕩宼將軍程普墓程普字徳謀右北平土垠人初為州郡吏從孫堅征伐堅卒復隨孫䇿以功為吳郡都尉徙丹陽拜蕩寇中郎將領零陵太守䇿卒與張昭等共輔孫權周旋三郡平討不服領江夏太守遷蕩冦將軍卒吳志程普墓在瑞昌縣安泰郷桂林橋西南江西通志晉侍中羅含墓羅含字君章耒陽人初為郡功曹轉州主簿桓温臨州補征西參軍徵為尚書郎累遷廷尉長沙相致仕還家階庭忽蘭菊叢生人以為徳行之感年七十七卒晉書羅含墓在耒陽縣南四十里湖廣通志按普含二墓顯然不在湖州與本傳相符魯公何據而書之晉黄門侍郎潘尼墓潘尼字正叔中牟人舉秀才為太常博士累官中書令永嘉中遷太常卿洛陽將沒擕家屬東出成皋即今鞏縣欲還郷里道遇賊不得前病卒于塢壁晉書潘尼墓在縣東一十里太平寰宇記按本傳尼卒于塢壁何縁墓在此寰宇記想亦因石柱而載之齊宣城太守丘靈鞠墓丘靈鞠烏程人仕宋累官本郡中正兼中書郎入齊歴通直常侍東觀祭酒再遷長沙王車騎長史大中大夫卒齊書丘靈鞠墓不詳所在談志梁中書侍郎丘遲墓丘遲字希範靈鞠子仕齊歴殿中郎車騎録事參軍入梁遷中書郎歴司徒從事郎卒官梁書丘遲墓在縣南一十六里太平寰宇記沈太虚侍郎虚中言昔湖州有人發古冢得碑乃南朝丘遲其言遲乃左史丘明之後然則丘明竟不姓左邪能改齋漫録按諸道石刻錄云呉興丘氏大宗碑唐元和四年十月二十二日建虚中言所發之碑殆即是歟急就篇注左丘明本魯之左史繼守其職遂為姓韻㑹云丘姓出呉興河南二望風俗通曰魯左丘明之後藁簡贅筆亦云呉興丘墓一村之人皆姓丘有大碑列其墓上稱左史丘明之後談志之著姓歴叙丘氏世系何不主此說豈以諸書為不足據邪又輿地碑記目云呉興丘氏墓碑在烏程縣霅水鄉淋谷考劉宋晉陵太守丘傑烏程人年十四母卒止啖生菜歳餘得腹疾痛甚一日夢母曰死生是分别耳何爾徒苦啖生菜遇煅蟇毒靈牀前有藥三丸可取服之傑驚起果得一甌藥服之下蝌子數升疾頓愈丘氏世保此甌傑居縣南七里鄰人胡氏築牆侵其界傑時未成童輒夜移籬退三尺胡氏慚亦退三尺遂成大路至今稱為丘路傑卒葬縣西一十八里疑即在霅水郷也淋谷未詳梁司空康絢縝墓按絢縝不知何許人南史有康絢藍田人仕梁至司州刺史領安陸太守普通元年除衛尉卿未拜卒今云司空又贅一縝字恐未必是或者疑即康翼之後康宗之攴族陳五兵尚書康宗墓汲郡蘭陵令奮節將軍康翼隨晉元帝渡江為吳興郡丞因居烏程事見吳興記翼生豫章太守鎮鎭生征擄司馬建武將軍欽信欽信生宋晉熙王兵曹參軍黯黯生南臺郎髙髙生齊驃騎大將軍孟眞孟真生梁散騎侍郎僧朗僧朗生陳給事中五兵尚書宗先為山隂令子孫始居㑹稽顔魯公集按二康墓俱不詳所在石柱記箋釋巻一
