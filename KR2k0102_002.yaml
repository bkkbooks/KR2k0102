body:
  text: 石柱記箋釋卷二歸安鄭元慶撰長城縣朱梁避廟諱改曰長興吳興長城令晉太康三年分烏程宋書按輿地廣記輿地紀勝俱云長興安吉二縣梁陳屬陳留郡史無明文不知何所本吳郡長城縣平陳廢仁夀二年復有雉山隋書按雉山在縣北五里梁陳故事云梁武帝時童謡鳥山出天子江表凡以鳥名山者悉鑿之獨此山不鑿陳髙祖為皇帝追贈之長城縣㑹昌四年十一月升望唐㑹要長城望大業末沈法興置長州武德四年更置綏州因古綏安縣名之又更置雉州并置原鄉縣七年州廢省原鄉以長城來屬有西湖溉田三千頃其後湮廢貞元十三年刺史于頔復之人賴其利顧山有茶以供貢有銅新唐書按顧山即顧渚在縣西北四十二里元和郡縣志及輿地紀勝析而為二非也顧渚以吳王夫槩顧其渚可為都邑故名唐有貢焙院院側有清風樓絶壁峭立於大澗中流亂石飛走曰明月峽茶生其閒尤為絶品張文規詩清風樓下草初出明月峽中茶始生讀書後志云陸羽與朱放輩論茶以顧渚為第一羽著茶經有云紫者上緑者次筍者上芹者次膳夫經云茶古不間食之晉宋以降吳人採其葉煮是為茶粥至開元天寶之間稍稍有茶至德大歷遂多建中以後盛矣茗絲鹽鐵管𣙜存焉元和郡縣志云顧渚每歲進奉茶役工三萬人纍月方畢南部新書云顧渚貢焙歲造一萬八千四百斤建中二年袁髙刺郡進三千六百串詩開成三年以貢不如法停刺史裴充官舊編云貞元五年貢限清明到京謂之急程茶張文規詩牡丹花笑金鈿動傳奏吳興紫筍來自袁髙以詩進規遂為貢茶輕省之始牟氏陵陽集云宋朝重建茗顧渚寂寥幾三百載元復修唐貢焙設湖常等處茶園提舉領之長興顧志引蕭洵顧渚採茶記有云國朝自丁酉年至洪武七年歲貢葉茶增至千斤又末茶變易價錢時值九十六萬奇八年革罷每歲止貢芽茶二斤永樂二年增至三十斤與㑹典開載相同今東南盛行嶰茶嶰茶箋云環長興境産茶者曰羅嶰曰白巖曰烏瞻曰青峴曰篠浦曰顧渚不可指數獨羅嶰最勝環嶰境十里而遙為嶰者亦不可指數嶰而曰􅔩兩山之介也羅氏居之在小秦王廟後所以稱廟後羅嶰也嶰茶彚鈔云羅嶰介於山中羅隱隱此故名羅嶰今唯洞山最佳縣西一百二十里曰九龍山山上有古石城乂名石郭山輿地志云吳採章山之銅即此與安吉接界吳王闔閭使其弟夫槩王居此築城狹而長因以為名元和郡縣志初置縣冨陂村晉咸康元年徙若溪北即今重光觀地隋大業十一年徙於夫槩王廢城唐武德七年始移今所太平寰宇記大雷山大雷山在縣東北六十里髙一百二十丈太平寰宇記小雷山洞庭之東山屬烏程大雷山洞庭之西山屬長興吳興舊編兩山南北相對而不相見見即有風雷之異曰大雷小雷震澤編大雷山小雷山澤山三山包山俱在太湖中舊屬烏程今并屬蘇州吳縣勞鉞府志按大小雷分屬二縣魯公何以獨記大雷勞志又何以皆屬之烏程也太湖志大雷在洞庭山西北小雷在洞庭山西南續志兩山相去六十里在晉陵縣馬跡山西舊編之說誤也豫問之前太湖守備牛龍光斗云長興夾浦之東三里即大雷山長興分界烏程大錢之北二十里即小雷山烏程分界俱在西洞庭之西勞志云並屬蘇州亦誤也晏氏類要輿地紀勝明一統志俱云歸安縣三山在太湖中大誤蓋歸安不能與太湖相接也芳巖按輿地紀勝引寰宇記云芳巖又名童山在宜興縣南六十里風土記云芳巖即此山也豈魯公時屬在長興邪震澤震澤吳南太湖名孔氏書傳孔氏以太湖為震澤非是周官九州有澤藪有川有浸揚州澤藪為具區其浸為五湖既以具區為澤藪則震澤即具區也太湖乃五湖之總名耳凡言藪者皆人資以為利故曰藪以冨得民而浸則但水之所鍾也今平望八尺一作測震澤之間水瀰漫而極淺與太湖相接而非太湖積潦暴至無以泄之則溢而害田所以謂之震蒲魚蓮芡之利人所資者甚廣亦或可隄而為田與太湖異所以謂之澤他州之澤無水暴至之患則為一名而巳而具區與三江通塞為利害故二名以别之此非吳越之人不知而先儒皆北人但據文為說宜其顯然失之地理而不悟也避暑録話按爾雅吳越之間有具區郭注今吳縣西南太湖即震澤亦非是禹貢長箋云職方具區即禹貢震澤胡氏禹貢錐指從之今烏程有震澤上下二鄉自上林軋村至南潯鎮皆是其地濵太湖蓋取諸此與葉氏之說相合魯公獨記長興而不及烏程何與若溪若溪在縣南五十步輿地志云夾溪悉生箭箬亦名箬溪太平寰宇記箬溪南岸曰上若北岸曰下若人取下若水釀酒極美勝於雲陽俗稱下若酒程縯蘇詩注按臧衍長興志創為中若之說至今有稱長興為三若者謬矣白居易詩勞將下若忘憂酒寄與江城愛酒翁錢几詩上箬溪頭老圃家古若箬通用張景陽七命云酒則荆南烏程說者以荆州有烏程鄉也藝苑雌黃云非也即烏程荆溪之南耳荆溪本在烏程後置長興故在長興境內二說未知孰是今下若絶無美酒唯烏程之南潯歸安之菱湖溪流淸冽釀酒最佳花果之類隨意投入味益增勝其優劣以麯之粗細米之糙白水之清濁為差優者為三白聲聞輦下曰潯酒曰湖酒云箬溪源出合溪在畫溪下流穿城東注明初耿炳文築城開濠環城遂分流於城外繞過龍潭灣至下箬寺㑹南溪諸水從新塘入太湖長興顧志吳王夫槩廟夫槩廟在縣東一百步太平寰宇記夫槩廟二一在縣東一在縣西南七十里俗呼為都監以其曽監築城故也勞府志按語林狄仁傑為江南安撫使以周赧王項羽吳夫槩等神廟七百餘所有害於民悉除之魯公在梁公後仍記此廟豈未嘗毁乎圖經作吳王棠溪氏廟即夫槩也類要作夫差王廟非是陳景帝陵齊太常卿道巨生皇考文纘文纘生霸先永定元年霸先即皇帝位追尊皇考曰景皇帝廟號太祖皇妣董太夫人曰安皇后墓曰瑞陵陳書瑞陵在縣西北五里談志陳錢皇后陵錢氏長城人父仲方髙祖微時先娶之早卒及即位追尊為昭皇后墓曰嘉陵陳書嘉陵在縣北五里談志陳昭烈王陵髙祖兄道談梁太平二年詔贈散騎常侍使持節平北將軍南兖州刺史長城縣公加義興郡公諡曰昭烈髙祖即位追贈驃騎大將軍太尉封始興郡王陳書道談仕梁為東宫值閣將軍侯景亂領弩手二千援臺城中流矢卒葬縣西北五里文帝即位尊為明陵談志謝安墓謝安字安石陽夏人簡文帝時桓溫請為司馬弟萬病卒安求歸尋除吳興太守在官無當時譽而去後為人所思嘗開城西官塘民獲其利號曰謝公塘召拜侍中進太保卒贈太傅諡文靖晉書按太平寰宇記云謝公塘在烏程縣西四里唐大歷中刺史裴清於州西起謝塘館復齊碑目云謝公塘碑唐刺史裴清撰僧道詵書大歷七年十月十一日龍興寺沙門皎然建魯公題碑隂曰太保謝公東晉咸和中以吳興山水清逺求典此郡郡西至長城縣通水陸今尚稱謝公塘及遷去郡人用懷思刻石紀功焉歷代至皇唐天寶末羣盜起公之碑志失於所在眷求蕪沒深為愴然借舊史遺文敬刋息石公之雅量蓋嗟歎之不足此碑隂不知魯公何年所書年譜不載集古録云射堂記唐顔真卿撰並書碑石缺壞不可考以大歷十二年立年譜亦不載射堂者吾湖古教場㕔事也六一題跋云魯公在湖州所書刻於石者子家集録多得之今僕射相公筆法精妙為豫稱顔氏書射堂記最佳遂以此本遺豫以豫家素所藏諸書較之唯張敬因碑與斯記為尤精徑陵陽集云魯公乞米鹿脯二帖舊刻在忠烈廟廡苕記云魯公蠶頭鼠尾碑在明月峽宋時州縣數來摹拓土人憚費擊碎之又有斷碑二在墨妙亭烏程有浪迹先生𤣥真子碑皆魯公書年譜俱不載再按談志放生池在駱駝橋東距羅城有閶門遺跡池周數十畝唐乾元三年春三月詔洋州之興道泉山南劒南黔中荆南嶺南江西浙江諸道迄於升州之江寧秦淮太平橋臨江帶郭上下五里各置放生池凡八十一所此其一也魯公立碑池上又以所賜敕書批答中諸事志之碑隂輿地紀勝云宋嘉祐六年州人建魯公祠於池上知州事張田移公所書干祿字碑放生池碑項王碑射堂碑列於兩廡繫年録云紹興三年三月庚申名湖州唐太子太師顔真卿廟曰忠烈用守臣汪藻請也勞志載駱駝橋東有能仁院放生池並廢今東街尚有承天寺巷疑即能仁院相近有池俗名稱錘潭却有閶門遺跡即放生池也此皆郡人所罕知者故附見於此謝安墓在縣南六十五里初葬建康梅山陳始興王叔陵發其冢裔孫夷吾為長城令徙於縣南三鴉岡吳興雜録按宋康定中知州事胡宿奏乞於冡㫄申禁樵採給復五家以備灑掃守護之役敕州縣官吏歲時祠祭以明聖朝紀元功褒有德之意從之長興顧志云三鴉岡在縣治西南四十里與雜録不合殷仲文墓殷仲文陳郡人吳興太守殷康子㑹稽王道子引為驃騎參軍後為元顯征虜長史㑹桓𤣥與朝廷有隙𤣥之娣仲文妻也疑而間之左遷新安太守𤣥平京師便棄郡投𤣥為咨議參軍𤣥將為亂使總領詔命以為侍中領左衛將軍𤣥九錫仲文之辭也初𤣥篡位入宫其牀忽陷羣下失色仲文曰將由聖德深厚地不能載𤣥大恱尋敗仲文隨𤣥西走因奉二后投義軍為鎮軍長史轉尚書帝初反正抗表自解遷東陽太守義熙三年伏誅晉書殷仲文墓在縣東三十二里太平寰宇記按仲文人品如此其墓亦可以不記况江南通志載其墓在太平府城南一十五里陳武帝故宅髙祖武皇帝諱霸先字興國長城下若里人仕梁纍官太傅進相國總百揆加封十郡為陳王永定元年冬十月受梁敬帝禪即皇帝位三年六月崩年五十七諡武皇帝廟號髙祖陳書廣惠教寺在縣治東九里相傳為陳武帝故宅談志陳武帝故宅或云在報德寺或云在廣惠寺未知孰是或者廣惠乃其所生之地而報德則其所居之處也長興顧志陳文帝故宅世祖文皇帝諱蒨字子華昭烈王長子髙祖崩遺詔徵繼大統七年崩年四十五諡文皇帝廟號世祖陳書長城宫在縣西二里陳文帝所居天嘉二年置于大寧寺後談志吳均故宅吳均字叔庠故鄣人好學工詩文天監初栁惲守吳興舉補主簿後以薦召入賦詩待詔著作纍遷奉朝請普通元年卒梁書吳均居青山在吳興之西柳太守惲召補主簿始入東境乃作入東記以辨山川故實吳興掌故集按太平寰宇記青山在長興縣南六十里安吉江志州東北三十五里曰青山一名均山以吳均名又云吳均故宅在順安鄉青山長興安吉二縣接界均本傳故鄣人其宅當在安吉陳氏五主屏風按陳氏五主髙祖霸先世祖蒨廢帝伯宗髙宗頊後主叔寶釋名屛風以屛障風也扆在後所依倚也禮記明堂位天子負斧扆南面而立三禮圖扆縱廣八尺畫斧文今之屛風則遺像也陳髙祖竹帳按唐書唐髙祖時吳王杜伏威獻竹帳上以勞人不受則竹帳匪獨陳髙祖有之國朝髙僧南山律主道宣道宣姓錢氏長城人唐武德中住終南山與處士孫思邈結林下之交每一往來議論終夕西明寺初就詔充上座撰法門文記廣𢎞明集續髙僧傳卒諡澄照髙僧傳安吉縣明成化二十三年十一月甲辰開設孝豐縣割安吉縣之九鄉及長興縣之三鄉隸之見實録今志作𢎞治二年者誤也又正德元年十一月乙丑改安吉縣為安吉州見實録今志作二年者誤也丹陽郡故鄣莽曰候望漢書注丹陽郡故鄣秦鄣郡所治吳興記曰中平二年分縣南置安吉縣光和末張角亂此鄉守險助國漢嘉之故立縣中平二年又分立原鄉縣續漢書注安吉縣㑹昌四年十一月升緊唐㑹要安吉緊義寧二年沈法興置武德四年賊平因之以縣隸桃州七年省入長城麟德元年復置北三十里有邸閣池北一十七里有石鼓堰引天目山水溉田百頃皆聖歷初縣令鉗耳知命置有銅有錫新唐書按桃州以山得名今孝豐縣西南五十里有桃花山出桃花石皎然詩桃州採得桃花石史記吳王濞傳吳有豫章郡銅山韋注今故鄣此有豫字誤也當云章郡章鄣古字通今州東三十里有銅山括地志云吳採鄣山之銅即此輿地紀勝云安吉有銅祠古出銅處又州東南二十二里有白楊山括地志云上有兩穴古採錫處安吉舊治在天目鄉今孝豐縣址是也唐開元中縣令孔志道移治於玉磬山東南無城洪武丙申總管張德始城之元帥費愚監其事安吉江志天目山今屬孝豐縣在縣西南六十五里勾餘山東五百里曰浮玉之山北望具區東望諸毗有獸焉其狀如虎而牛尾其音如吠犬其名曰彘是食人苕水出於其隂北流注於具區其中多鮆魚山海經按爾雅鮤鱴刀郭注今之鮆魚也異魚圖贊云鮆魚蝴蝶所化列長䰅今太湖有之大者名刀鮆小者亦可作鮓張文規詩食有吳興鮓蔡寬夫詩話云吳中作鮓多就溪池中荷葉包為之味比瓶缶中者尤佳白居易詩就荷葉上包魚鮓當石渠中浸酒尊近世道士唐子霞謂圗經天目山一名浮玉山連亘四州杭宣徽湖周回二千里上有養生之藥蓍草元華皆名著仙經咸淳臨安志按天目山山之最大者也山海經多記天下名山大川是以及之時但名浮玉不名天目也太平寰宇記記天目而不言浮玉各志遂於天目山後另列一浮玉山皆非也當依唐子霞為是天目山以其上有兩湖似左右目名天目也趙次公蘇詩注天目山左髙於地七千五百丈右髙於地七千丈縱廣三千里雜道書天目有二峰東峰從臨安入西峰從孝豐入有十二龍潭六潭屬孝豐六潭屬於潛天目山志天目之頂有龍居焉中常出水四方而下南派由睦西派由歙皆入浙江東派由餘杭北派由安吉皆㑹太湖入吳江徑山山門事狀天目山神形如白鹿每歲五月與震澤龍㑹多暴風雨六研齊筆記按山海經南次二經諸山神狀皆龍身而鳥首其祠毛用一璧瘞糈用梌李太僕不知何據云形如白鹿也今天目山之神廟在孝豐縣金石鄉舊制歲以六月六日有司致祭後更春秋二仲月崑山玉磬山髙五百尺在縣東北十五里太平寰宇記梁僧曇諦吳興人居故鄣崑山每夜聞有聲尋其發聲之所得玉磬因以為名髙僧傳橫溪按舊志無橫溪孝豐新志云橫溪在縣西北當即苕水太平寰宇記所謂苕水在安吉縣治西南七十五里者此也談志云苕溪之源有二一發自天目山之隂廣苕山東過金石鄉又東過靈奕鄉又東過安吉縣南之郡渡乂東南過章渡又折而北至丘渡與獨松水合一發自獨松嶺西合衆山之水東過浮石山南又折而西北至丘渡與廣苕水合二水合而東過倪渡又折而西又折而東北過梅溪鎮北為龍溪又北過吳山又北過彭匯又東過和平入凡常湖箬溪四安塘諸水北來注之匯為西溪北過釣魚灣又北過迎禧門又折而東至臨湖門與霅溪水合又自西溪東入清源門至於霅溪又自清源門折而南又折而東出愈思橋與峴山漾南來水合又自西溪北過迎禧門又東北下橫涇港經小梅湖口入太湖梅溪梅溪一名東海堰統記梅溪在縣東北三十里溪上多梅故名或曰昔年嘗有紫梅花盛開又號紫梅溪談志梅溪以梅得名而烏梅特為名産他方所製取自殘落安吉特摘完好者為之其得名非徒然也吳興掌故集蛟龍池天目山東南有瀑布下注數畝深沼名曰蛟龍池水經注按說文云蚊龍屬也無角曰蛟池魚滿三千六百蛟來為之長能率魚飛置笱水中則蛟去埤雅云龍八十一鱗具九九之數九陽也廣雅云有鱗曰蛟龍郭璞云蛟似蛇四腳細頸故杜氏編珠作蛇龍池蛇俗蛇字翔鳳林天目山上有霜木皆是數百年樹謂之翔鳳林水經注翔鳳林在天目之東北峰髙峻類天柱廬阜咸淳臨安志按龍池鳳林俱在東峰恐非湖境裴子野故宅裴子野字幾原聞喜人初仕齊入梁歷著作郎掌國史起居注尋除通直正員外又敕掌中書詔誥歷鴻臚卿領步兵校尉卒贈散騎常侍諡貞子梁書裴子野寓居湖州之故鄣著諸侯略宅在縣西南三十六里永昌鄉輿地紀勝裴子野曽祖松之令故鄣有善政邑人愛之子野因寓居焉談志周𢎞讓故宅周𢎞讓安城人天嘉初以白衣領太常卿光祿大夫加金章紫綬陳書周𢎞讓兄𢎞正仕梁為安吉令𢎞讓結宇山中耽玩文史其故宅在縣南三十六里談志姚萇雉尾扇姚萇赤亭羌虜苻堅以為龍􅋮將軍後自稱秦王太元十年弒堅據長安僭稱帝一夕夢堅率鬼兵刺之出血數斗死晉書商髙宗有雉雊之徵章服多用翟故有雉尾扇古今注施世瑛金鐘施世瑛字玉華安吉人家世農不親襏襫喜騎射隋末多盜紏合少年膂力保禦鄉境唐興以衆歸附積功拜洮州刺史賜金鐘一口錦五段敕書褒美舊唐書屏風竹帳雉尾扇金鐘皆先代遺物流傳於世者然魯公何至刻而記之吳興掌故集石柱記箋釋卷二
